server {
    listen 80;

    #Tout ce qui commence par /api/ sera redirigé vers le backend (Docker container)
    location /api/ { 
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    #Tout ce qui commence par / sera redirigé vers le frontend (Docker container)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";  # Pour le hot-reload Nuxt
    }
}